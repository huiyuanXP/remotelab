<title>RemoteLab Chat</title>
<script nonce="{{NONCE}}">(function(){
  var m=localStorage.getItem('themeMode')||'auto';
  var h=new Date().getHours();
  if(m==='dark'||(m==='auto'&&(h<7||h>=19)))
    document.documentElement.setAttribute('data-theme','dark');
}());</script>
<style nonce="{{NONCE}}">
:root {
  --bg: #ffffff;
  --bg-secondary: #f9f9f9;
  --bg-tertiary: #f0f0f0;
  --border: #e5e5e5;
  --border-strong: #d0d0d0;
  --text: #111111;
  --text-secondary: #777777;
  --text-muted: #aaaaaa;
  --accent: #111111;
  --accent-dim: #f0f0f0;
  --user-bubble: #f0f0f0;
  --tool-bg: #fafafa;
  --success: #16a34a;
  --success-bg: #f0fdf4;
  --error: #dc2626;
  --error-bg: #fef2f2;
  --warning: #d97706;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
  --sidebar-width: 300px;
  --sidebar-collapsed-width: 48px;
  --content-max: 740px;
}

[data-theme="dark"] {
  color-scheme: dark;
  --bg: #0f0f0f;
  --bg-secondary: #171717;
  --bg-tertiary: #222222;
  --border: #2a2a2a;
  --border-strong: #383838;
  --text: #e8e8e8;
  --text-secondary: #999999;
  --text-muted: #5a5a5a;
  --accent: #e8e8e8;
  --accent-dim: #222222;
  --user-bubble: #1e1e1e;
  --tool-bg: #171717;
  --success: #4ade80;
  --success-bg: #052e16;
  --error: #f87171;
  --error-bg: #1c0a0a;
  --warning: #fbbf24;
}
[data-theme="dark"] .input-wrapper:focus-within { border-color: #555; }
[data-theme="dark"] .modal { box-shadow: 0 8px 40px rgba(0,0,0,0.5); }

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, system-ui, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ---- Header ---- */
.header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 12px;
  padding-top: var(--safe-top);
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  height: calc(48px + var(--safe-top));
  flex-shrink: 0;
}
.header-left {
  display: flex; align-items: center; gap: 8px;
  flex: 1; min-width: 0;
}
.header-right {
  display: flex; align-items: center; gap: 4px;
  flex-shrink: 0;
}
.header h1 { font-size: 15px; font-weight: 600; color: var(--text); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ---- Header context bar ---- */
.header-ctx {
  flex: 1;
  display: none;
  align-items: center;
  gap: 6px;
  min-width: 0;
  padding: 0 4px;
}
.header-ctx.visible { display: flex; }
.header-ctx-detail {
  font-size: 9px;
  color: var(--text-muted);
  white-space: pre;
  line-height: 1.5;
  flex-shrink: 0;
}
.header-ctx-bar-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 4px;
  min-width: 40px;
}
.header-ctx-track {
  flex: 1;
  height: 5px;
  border-radius: 3px;
  background: var(--border);
  overflow: hidden;
  min-width: 30px;
}
.header-ctx-fill {
  height: 100%;
  border-radius: 3px;
  background: var(--success);
  transition: width 0.4s ease, background 0.4s ease;
}
.header-ctx-fill.warn { background: var(--warning); }
.header-ctx-fill.danger { background: var(--error); }
.header-ctx-pct {
  font-size: 10px;
  color: var(--text-muted);
  flex-shrink: 0;
  min-width: 28px;
  text-align: right;
}
.header-ctx-pct.danger { color: var(--error); font-weight: 700; }
.header-ctx-compress {
  display: none;
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 4px;
  border: 1px solid var(--error);
  background: transparent;
  color: var(--error);
  cursor: pointer;
  flex-shrink: 0;
  white-space: nowrap;
}
.header-ctx-compress.visible { display: block; }
.header-ctx-compress:hover { background: var(--error); color: #fff; }
.header-ctx-compress:disabled { opacity: 0.5; cursor: not-allowed; }
.header-ctx-clear {
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 4px;
  border: 1px solid var(--border-strong);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  flex-shrink: 0;
  white-space: nowrap;
  display: none;
}
.header-ctx-clear:hover { background: var(--bg-tertiary); color: var(--text); }
.header-ctx-clear:disabled { opacity: 0.5; cursor: not-allowed; }
.header-ctx-clear.visible { display: block; }
.header-btn {
  background: none; border: none; color: var(--text-secondary);
  font-size: 16px; cursor: pointer; padding: 6px; border-radius: 6px;
  line-height: 1; display: flex; align-items: center; justify-content: center;
  width: 32px; height: 32px;
}
.header-btn:hover { background: var(--bg-tertiary); color: var(--text); }
.header-logo {
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted); flex-shrink: 0; transition: color 0.3s;
}
.header-logo.active { color: var(--success); }
.header-logo.active svg { animation: logo-spin 8s linear infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
#statusText { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

/* ---- Header mobile responsive ---- */
@media (max-width: 480px) {
  .header { gap: 4px; padding: 0 8px; padding-top: var(--safe-top); }
  .header-left { flex-shrink: 1; max-width: 30%; }
  .header h1 { font-size: 13px; }
  #statusText { display: none; }
  .header-ctx-detail { display: none; }
  .header-right { gap: 2px; }
  .header-right .header-btn { width: 28px; height: 28px; padding: 4px; }
}

/* ---- Report bell & badge ---- */
.report-bell { position: relative; }
.report-badge {
  position: absolute; top: 2px; right: 2px;
  background: var(--error); color: #fff;
  font-size: 10px; font-weight: 700; line-height: 1;
  min-width: 16px; height: 16px; padding: 2px 4px;
  border-radius: 8px; display: flex; align-items: center; justify-content: center;
  pointer-events: none;
}
.report-badge.hidden { display: none; }

/* ---- Report panel (right slide-in) ---- */
.report-panel {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: 360px; max-width: 100vw;
  background: var(--bg); border-left: 1px solid var(--border);
  z-index: 200; display: flex; flex-direction: column;
  box-shadow: -4px 0 16px rgba(0,0,0,0.08);
  transition: transform 0.2s ease;
}
.report-panel.hidden { display: none; }
.report-panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; border-bottom: 1px solid var(--border);
}
.report-panel-header h3 { margin: 0; font-size: 15px; font-weight: 600; color: var(--text); }
.report-list { flex: 1; overflow-y: auto; padding: 8px 0; }
.report-item {
  display: flex; flex-direction: column; gap: 2px;
  padding: 10px 16px; cursor: pointer; border-bottom: 1px solid var(--bg-tertiary);
  transition: background 0.15s;
}
.report-item:hover { background: var(--bg-secondary); }
.report-item.unread { border-left: 3px solid var(--accent); }
.report-item-title {
  font-size: 13px; font-weight: 600; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.report-item.unread .report-item-title { font-weight: 700; }
.report-item-meta {
  font-size: 11px; color: var(--text-secondary);
  display: flex; gap: 8px; align-items: center;
}
.report-item-delete {
  margin-left: auto; background: none; border: none; color: var(--text-muted);
  cursor: pointer; font-size: 14px; padding: 2px 4px; border-radius: 4px; line-height: 1;
}
.report-item-delete:hover { background: var(--error-bg); color: var(--error); }
.report-list-empty {
  padding: 32px 16px; text-align: center; color: var(--text-muted); font-size: 13px;
}

/* ---- Report detail overlay ---- */
.report-detail {
  position: fixed; inset: 0; z-index: 210;
  background: var(--bg); display: flex; flex-direction: column;
}
.report-detail.hidden { display: none; }
.report-detail-header {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; border-bottom: 1px solid var(--border);
  background: var(--bg);
}
.report-detail-title {
  flex: 1; font-size: 14px; font-weight: 600; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.report-goto-btn {
  font-size: 12px; padding: 4px 10px; border-radius: 6px;
  border: 1px solid var(--border-strong); background: transparent;
  color: var(--text-secondary); cursor: pointer; white-space: nowrap;
}
.report-goto-btn:hover { background: var(--bg-tertiary); color: var(--text); }
.report-iframe {
  flex: 1; border: none; width: 100%; background: #fff;
}

/* ---- App container ---- */
.app-container {
  display: flex;
  flex-direction: row;
  flex: 1;
  overflow: hidden;
}

/* ---- Sidebar ---- */
.sidebar-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3);
  z-index: 100;
}
.sidebar-overlay.open { display: block; }
.sidebar {
  position: fixed; left: -320px; top: 0; bottom: 0; width: 320px;
  background: var(--bg); border-right: 1px solid var(--border);
  z-index: 101; transition: left 0.2s ease; display: flex; flex-direction: column;
  padding-top: var(--safe-top);
}
.sidebar-overlay.open .sidebar { left: 0; }
.sidebar-header {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 12px 12px 16px; border-bottom: 1px solid var(--border);
  min-height: 48px;
}
.sidebar-header h2 { font-size: 14px; font-weight: 600; flex: 1; }
.sidebar-list { flex: 1; overflow-y: auto; padding: 8px 8px; }

/* Sidebar tabs */
.sidebar-tabs {
  display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.sidebar-tab {
  flex: 1; padding: 8px 0; font-size: 12px; font-weight: 500;
  background: none; border: none; cursor: pointer;
  color: var(--text-muted); border-bottom: 2px solid transparent;
  margin-bottom: -1px; transition: color 0.1s;
  font-family: inherit; letter-spacing: 0.02em;
}
.sidebar-tab.active { color: var(--text); border-bottom-color: var(--text); }
.sidebar-tab:hover:not(.active) { color: var(--text-secondary); }

/* Progress panel */
.progress-panel {
  flex: 1; overflow-y: auto; padding: 8px;
  display: none; flex-direction: column; gap: 6px;
}
.progress-panel.visible { display: flex; }
.progress-card {
  padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--bg-secondary); cursor: default;
}
.progress-card-header {
  display: flex; align-items: center; gap: 6px; margin-bottom: 5px;
}
.progress-card-name {
  font-size: 12px; font-weight: 600; color: var(--text); flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.progress-card-folder {
  font-size: 10px; color: var(--text-muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.progress-card-bg {
  font-size: 12px; color: var(--text-secondary); line-height: 1.45; margin-bottom: 5px;
}
.progress-card-action {
  font-size: 11px; color: var(--text-muted); line-height: 1.4;
  border-top: 1px solid var(--border); padding-top: 5px; margin-top: 2px;
}
.progress-card-time {
  font-size: 10px; color: var(--text-muted); margin-top: 4px;
}
.progress-empty {
  padding: 32px 16px; text-align: center; color: var(--text-muted);
  font-size: 12px; line-height: 1.6;
}
.progress-running-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--success);
  flex-shrink: 0; animation: pulse 1.5s infinite;
}
.progress-card-footer {
  display: flex; align-items: center; justify-content: space-between; margin-top: 4px;
}
.progress-summarizing {
  font-size: 10px; color: var(--text-muted); font-style: italic;
  animation: pulse 1.5s infinite; margin-top: 4px;
}
.progress-section-header {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.07em; color: var(--text-muted);
  padding: 10px 4px 4px; margin-top: 2px;
}
.progress-section-header:first-child { padding-top: 4px; }
.progress-section-header.is-pending-review { color: #f59e0b; }
.progress-section-header.is-running { color: var(--success); }
.progress-archive-toggle { cursor: pointer; user-select: none; }
.progress-archive-toggle:hover { color: var(--text-secondary); }
.progress-archive-chevron { display: inline-block; width: 10px; }
.progress-archived-section { margin-top: 4px; }
.progress-archive-body { display: flex; flex-direction: column; gap: 6px; }
.progress-card-label {
  font-size: 10px; font-weight: 500; padding: 1px 6px; border-radius: 3px;
  border: 1px solid; white-space: nowrap; flex-shrink: 0; margin-left: auto;
}

/* Folder groups */
.folder-group { margin-bottom: 4px; transition: opacity 0.15s; }
.folder-group.dragging { opacity: 0.4; }
.folder-drag-placeholder {
  border: 2px dashed var(--text-muted); border-radius: 8px; margin-bottom: 4px;
  opacity: 0.4; box-sizing: border-box;
}
.folder-drag-handle {
  cursor: grab; color: var(--text-muted); font-size: 12px; padding: 0 2px;
  opacity: 0; transition: opacity 0.15s; user-select: none; touch-action: none;
  flex-shrink: 0;
}
.folder-group-header:hover .folder-drag-handle { opacity: 0.6; }
.folder-drag-handle:hover { opacity: 1 !important; color: var(--text-secondary); }
/* Always show drag handle and folder add btn on touch devices */
@media (hover: none) {
  .folder-drag-handle { opacity: 0.5; }
  .folder-add-btn { opacity: 0.7; }
  .session-action-btn { display: none; }
  .session-menu-btn { display: flex !important; }
}
/* JS-based touch detection fallback (more reliable on real Android/iOS) */
.touch-device .folder-drag-handle { opacity: 0.5; }
.touch-device .folder-add-btn { opacity: 0.7; }
.touch-device .session-action-btn { display: none; }
.touch-device .session-menu-btn { display: flex !important; }
.folder-group-header {
  display: flex; align-items: center; gap: 6px; padding: 5px 8px;
  cursor: pointer; border-radius: 6px; font-size: 12px; color: var(--text-secondary);
  user-select: none;
}
.folder-group-header:hover { background: var(--bg-secondary); }
.folder-group-header .folder-chevron {
  font-size: 9px; transition: transform 0.15s; display: inline-block; color: var(--text-muted);
}
.folder-group-header.collapsed .folder-chevron { transform: rotate(-90deg); }
.folder-group-header .folder-name {
  flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  font-weight: 500; color: var(--text-secondary); font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.04em;
}
.folder-group-header .folder-count {
  font-size: 11px; color: var(--text-muted); background: var(--bg-tertiary);
  padding: 1px 6px; border-radius: 10px;
}
.folder-running-badge {
  display: inline-flex; align-items: center; gap: 3px;
  color: var(--success); font-weight: 600; font-size: 11px;
  margin-left: 4px;
}
.folder-running-badge svg { animation: logo-spin 8s linear infinite; }
.folder-group-header.collapsed + .folder-group-items { display: none; }
.folder-add-btn {
  background: none; border: none; color: var(--text-muted); cursor: pointer;
  font-size: 15px; padding: 1px 5px; border-radius: 4px; line-height: 1;
  opacity: 0; transition: opacity 0.1s; flex-shrink: 0;
}
.folder-group-header:hover .folder-add-btn { opacity: 1; }
.folder-add-btn:hover { background: var(--bg-tertiary); color: var(--text); }

.session-item {
  padding: 7px 8px 7px 12px; border-radius: 8px; cursor: pointer; margin-bottom: 1px;
  border: 1px solid transparent; display: flex; align-items: center; gap: 6px;
}
.session-item-logo {
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted); flex-shrink: 0;
  cursor: pointer; border-radius: 6px; padding: 2px; margin: -2px;
  transition: color 0.3s, background 0.15s, transform 0.15s;
}
.session-item-logo.running { color: var(--success); }
.session-item-logo.running svg { animation: logo-spin 8s linear infinite; }
.session-item:hover .session-item-logo { background: var(--bg-tertiary); }
.session-item-logo:hover { background: var(--border-strong) !important; transform: scale(1.12); }
.session-item-logo:active { transform: scale(0.9) !important; }
.session-item:hover { background: var(--bg-secondary); }
.session-item.active { background: var(--bg-tertiary); border-color: var(--border); }
.session-item-info { flex: 1; min-width: 0; }
.session-item-name {
  font-size: 13px; font-weight: 500; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.session-item-meta {
  font-size: 11px; color: var(--text-muted); margin-top: 1px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.session-item-meta .status-running { color: var(--success); }
.session-item-actions { display: flex; gap: 2px; align-items: center; flex-shrink: 0; }
.session-action-btn {
  background: none; border: none; color: var(--text-muted); cursor: pointer;
  font-size: 13px; padding: 3px 5px; border-radius: 4px; line-height: 1;
  opacity: 0; transition: opacity 0.1s;
}
.session-item:hover .session-action-btn { opacity: 1; }
.session-action-btn:hover { background: var(--bg-tertiary); color: var(--text); }
.session-action-btn.del:hover { background: var(--error-bg); color: var(--error); }
.session-action-btn.archive:hover { background: var(--bg-tertiary); color: var(--text-secondary); }
.session-action-btn.unarchive:hover { background: var(--success-bg); color: var(--success); }
.session-item.archived { opacity: 0.55; }
.session-item.archived:hover { opacity: 0.8; }
.session-menu-btn {
  display: none; background: none; border: none; color: var(--text-muted); cursor: pointer;
  font-size: 17px; padding: 2px 6px; border-radius: 4px; line-height: 1;
  align-items: center; justify-content: center; flex-shrink: 0;
}
.session-menu-btn:active { background: var(--bg-tertiary); color: var(--text); }
.session-dropdown {
  position: fixed; z-index: 2000; background: var(--bg-secondary);
  border: 1px solid var(--border); border-radius: 10px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.22); padding: 4px 0; min-width: 150px;
}
.session-dropdown-item {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 16px; font-size: 13px; color: var(--text); cursor: pointer;
}
.session-dropdown-item:hover, .session-dropdown-item:active { background: var(--bg-tertiary); }
.session-dropdown-item.del { color: var(--error); }
.session-dropdown-item.del:hover, .session-dropdown-item.del:active { background: var(--error-bg); }
.session-dropdown-label-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.archived-section { padding: 0 8px 8px; }
.archived-section-toggle {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 6px; font-size: 11px; color: var(--text-muted);
  cursor: pointer; border-radius: 6px; user-select: none;
}
.archived-section-toggle:hover { color: var(--text-secondary); background: var(--bg-secondary); }
.archived-chevron { font-size: 9px; }
.archived-items { margin-top: 2px; }

/* Label popover */
.label-popover {
  position: absolute; z-index: 1000; background: var(--bg-secondary);
  border: 1px solid var(--border); border-radius: 10px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.25); padding: 6px 0;
  min-width: 180px; max-width: 240px;
}
.label-option {
  display: flex; align-items: center; gap: 8px; padding: 7px 12px;
  cursor: pointer; font-size: 13px; color: var(--text); transition: background 0.1s;
}
.label-option:hover { background: var(--bg-tertiary); }
.label-option.active { font-weight: 600; }
.label-color-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}
.label-separator {
  height: 1px; background: var(--border); margin: 4px 0;
}
.label-add-form {
  padding: 8px 12px; display: flex; flex-direction: column; gap: 6px;
}
.label-add-form input {
  padding: 4px 8px; font-size: 12px; border: 1px solid var(--border);
  border-radius: 6px; background: var(--bg); color: var(--text);
  font-family: inherit; outline: none;
}
.label-add-form input:focus { border-color: var(--accent); }
.color-picker-dots {
  display: flex; gap: 6px; flex-wrap: wrap;
}
.color-picker-dot {
  width: 18px; height: 18px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; transition: border-color 0.15s;
}
.color-picker-dot:hover, .color-picker-dot.selected {
  border-color: var(--text);
}
.label-add-confirm {
  padding: 4px 10px; font-size: 12px; border: none; border-radius: 6px;
  background: var(--text); color: var(--bg); cursor: pointer; align-self: flex-end;
}
.label-add-confirm:hover { opacity: 0.85; }

/* Inline rename input */
.session-rename-input {
  width: 100%; padding: 2px 4px; font-size: 13px; font-weight: 500;
  border: 1px solid var(--border-strong); border-radius: 4px; outline: none;
  background: var(--bg); color: var(--text); font-family: inherit;
}
.session-rename-input:focus { border-color: var(--accent); }

.new-session-btn {
  margin: 8px; padding: 9px 12px; background: var(--text); color: var(--bg);
  border: none; border-radius: 8px; font-size: 13px; cursor: pointer;
  font-weight: 500; text-align: center;
}
.new-session-btn:active { opacity: 0.85; }
.new-session-btn.hidden { display: none; }

/* Desktop sidebar collapse */
.sidebar-collapse-btn {
  display: none; background: none; border: none; color: var(--text-muted);
  font-size: 14px; cursor: pointer; padding: 4px 6px; border-radius: 6px;
}
.sidebar-collapse-btn:hover { background: var(--bg-tertiary); color: var(--text); }

/* ---- New Session Modal ---- */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.25);
  z-index: 200; align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg); border: 1px solid var(--border); border-radius: 14px;
  width: 92%; max-width: 420px; padding: 24px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.12);
}
.modal h3 { margin-bottom: 18px; font-size: 17px; font-weight: 600; }
.modal label { display: block; font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 4px; margin-top: 14px; text-transform: uppercase; letter-spacing: 0.04em; }
.modal label:first-of-type { margin-top: 0; }
.modal input, .modal select {
  width: 100%; padding: 10px 12px; background: var(--bg-secondary); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 14px; outline: none; font-family: inherit;
}
.modal input:focus, .modal select:focus { border-color: var(--border-strong); background: var(--bg); }
.modal-actions { display: flex; gap: 8px; margin-top: 22px; }
.modal-actions button {
  flex: 1; padding: 10px; border: none; border-radius: 8px; font-size: 14px;
  cursor: pointer; font-weight: 500; font-family: inherit;
}
.btn-cancel { background: var(--bg-tertiary); color: var(--text-secondary); border: 1px solid var(--border); }
.btn-create { background: var(--text); color: var(--bg); }

/* ---- Autocomplete suggestions ---- */
.ac-suggestions button {
  display: block; width: 100%; text-align: left; padding: 7px 10px;
  background: var(--bg-secondary); border: none; color: var(--text); font-size: 13px;
  cursor: pointer; border-radius: 6px; margin-top: 2px; font-family: inherit;
}
.ac-suggestions button:hover { background: var(--bg-tertiary); }

/* ---- Chat area ---- */
.chat-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

/* ---- Messages ---- */
.messages {
  flex: 1; overflow-y: auto; padding: 20px 16px;
  -webkit-overflow-scrolling: touch;
}
.messages-inner {
  max-width: var(--content-max);
  margin: 0 auto;
}
.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; color: var(--text-secondary); text-align: center; padding: 40px 20px;
}
.empty-state h2 { font-size: 22px; margin-bottom: 10px; color: var(--text); font-weight: 600; }
.empty-state p { font-size: 14px; line-height: 1.6; max-width: 320px; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: none; } }

/* User message — bubble right-aligned */
.msg-user {
  display: flex;
  justify-content: flex-end;
  margin-bottom: 16px;
  animation: fadeIn 0.15s ease;
}
.msg-user-bubble {
  background: var(--user-bubble);
  border-radius: 18px;
  border-bottom-right-radius: 5px;
  padding: 10px 16px;
  font-size: 15px;
  line-height: 1.5;
  word-wrap: break-word;
  white-space: pre-wrap;
  max-width: 80%;
  color: var(--text);
}
.msg-images { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
.msg-images img {
  max-width: 200px; max-height: 150px; border-radius: 8px; cursor: pointer;
  object-fit: cover;
}

/* Assistant message — no bubble, plain text */
.msg-assistant {
  margin-bottom: 20px;
  animation: fadeIn 0.15s ease;
  font-size: 15px;
  line-height: 1.65;
  color: var(--text);
  word-wrap: break-word;
  white-space: pre-wrap;
}

/* Markdown rendered content */
.md-content { white-space: normal; }
.md-content p { margin-bottom: 0.75em; }
.md-content p:last-child { margin-bottom: 0; }
.md-content h1, .md-content h2, .md-content h3,
.md-content h4, .md-content h5, .md-content h6 {
  font-weight: 600; line-height: 1.3; margin: 1em 0 0.4em;
}
.md-content h1 { font-size: 1.25em; }
.md-content h2 { font-size: 1.15em; }
.md-content h3 { font-size: 1.05em; }
.md-content h4, .md-content h5, .md-content h6 { font-size: 1em; }
.md-content h1:first-child, .md-content h2:first-child,
.md-content h3:first-child { margin-top: 0; }
.md-content ul, .md-content ol {
  padding-left: 1.4em; margin-bottom: 0.75em;
}
.md-content li { margin-bottom: 0.2em; }
.md-content li > ul, .md-content li > ol { margin-bottom: 0; }
.md-content code {
  background: var(--bg-tertiary); border-radius: 4px;
  padding: 1px 5px; font-size: 0.88em;
  font-family: 'SF Mono', Monaco, Consolas, monospace;
  color: var(--text);
}
.md-content pre {
  background: var(--bg-tertiary); border-radius: 8px;
  padding: 12px 14px; margin-bottom: 0.75em;
  overflow-x: auto; line-height: 1.5;
}
.md-content pre code {
  background: none; padding: 0; font-size: 0.85em; border-radius: 0;
}
.md-content blockquote {
  border-left: 3px solid var(--border-strong);
  margin: 0 0 0.75em; padding: 2px 0 2px 12px;
  color: var(--text-secondary);
}
.md-content a { color: var(--text); text-decoration: underline; }
.md-content a:hover { opacity: 0.75; }
.md-content hr {
  border: none; border-top: 1px solid var(--border);
  margin: 1em 0;
}
.md-content table {
  border-collapse: collapse; width: 100%; margin-bottom: 0.75em;
  font-size: 0.9em;
}
.md-content th, .md-content td {
  border: 1px solid var(--border); padding: 6px 10px; text-align: left;
}
.md-content th { background: var(--bg-secondary); font-weight: 600; }
.md-content strong { font-weight: 600; }
.md-content em { font-style: italic; }

/* System status */
.msg-system {
  text-align: center;
  font-size: 12px;
  color: var(--text-muted);
  margin: 8px 0;
  animation: fadeIn 0.1s ease;
}

/* Usage tokens */
.usage-info {
  font-size: 11px; color: var(--text-muted); text-align: center;
  padding: 4px; margin: 2px 0 12px;
}
.context-bar {
  height: 3px; border-radius: 2px; background: var(--border);
  margin: 5px auto 2px; width: 120px; overflow: hidden;
}
.context-bar-fill {
  height: 100%; border-radius: 2px;
  background: var(--text-muted); transition: width 0.3s;
}
.context-bar-fill.context-bar-danger { background: var(--error); }
.compact-btn {
  display: block; margin: 4px auto 0; font-size: 11px;
  padding: 3px 10px; border-radius: 6px; cursor: pointer;
  background: var(--bg-tertiary); color: var(--text-secondary);
  border: 1px solid var(--border); font-family: inherit;
}
.compact-btn:hover:not(:disabled) { color: var(--text); border-color: var(--border-strong); }
.compact-btn:disabled { opacity: 0.5; cursor: default; }

/* Session cleared banner */
.session-cleared-banner {
  text-align: center;
  padding: 28px 20px 24px;
  margin: 24px 0;
  border: 2px dashed var(--border-strong);
  border-radius: 12px;
  background: var(--bg-secondary);
  animation: fadeIn 0.2s ease;
}
.session-cleared-icon { font-size: 28px; margin-bottom: 8px; }
.session-cleared-title {
  font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 10px;
}
.session-cleared-desc {
  font-size: 13px; color: var(--text-secondary); line-height: 1.6;
  max-width: 380px; margin: 0 auto;
}

/* Compact divider */
.compact-divider {
  text-align: center; margin: 16px 0; padding: 10px;
  border-top: 1px dashed var(--border); border-bottom: 1px dashed var(--border);
  background: var(--bg-secondary);
}
.compact-divider-text {
  font-size: 12px; color: var(--text-muted); font-style: italic;
}

/* Restart banner (top of page) */
.restart-banner {
  position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
  background: #d97706; color: #fff;
  text-align: center; padding: 8px 16px; font-size: 13px; font-weight: 500;
  animation: fadeIn 0.2s ease;
}

/* Restart divider in chat */
.restart-divider {
  text-align: center; margin: 12px 0; padding: 8px 12px;
  border-radius: 6px; font-size: 12px; font-style: italic;
}
.restart-interrupt-divider {
  background: rgba(217, 119, 6, 0.12); color: #d97706;
  border: 1px dashed rgba(217, 119, 6, 0.4);
}
.restart-resume-divider {
  background: rgba(34, 197, 94, 0.1); color: #16a34a;
  border: 1px dashed rgba(34, 197, 94, 0.4);
}
.compact-summary-details {
  margin-top: 6px; text-align: left;
}
.compact-summary-details summary {
  font-size: 11px; color: var(--text-secondary); cursor: pointer;
  text-align: center;
}
.compact-summary-pre {
  font-size: 11px; color: var(--text-secondary);
  white-space: pre-wrap; word-break: break-word;
  max-height: 200px; overflow-y: auto;
  margin: 6px 0 0; padding: 8px;
  background: var(--bg-tertiary); border-radius: 6px;
}

/* Session error card */
.session-error-card { border-color: var(--error-bg); }
.session-error-actions { display: flex; gap: 8px; margin-top: 10px; }
.session-error-btn {
  flex: 1; padding: 9px 12px; border-radius: 8px; cursor: pointer;
  font-size: 13px; font-weight: 500; font-family: inherit;
  border: 1px solid var(--border);
}
.session-error-delete {
  background: var(--error-bg); color: var(--error); border-color: var(--error-bg);
}
.session-error-delete:hover { opacity: 0.85; }
.session-error-recover {
  background: var(--text); color: var(--bg); border-color: var(--text);
}
.session-error-recover:hover { opacity: 0.85; }
.session-error-btn:disabled { opacity: 0.5; cursor: default; }

/* ---- Thinking block ---- */
.thinking-block {
  margin-bottom: 16px;
  animation: fadeIn 0.15s ease;
}
.thinking-header {
  display: flex; align-items: center; gap: 8px;
  cursor: pointer; padding: 6px 0; user-select: none;
  color: var(--text-secondary); font-size: 13px;
}
.thinking-header:hover { color: var(--text); }
.thinking-icon { font-size: 14px; flex-shrink: 0; }
.thinking-label { flex: 1; font-style: italic; }
.thinking-chevron {
  font-size: 9px; transition: transform 0.2s; color: var(--text-muted);
}
.thinking-block.collapsed .thinking-chevron { transform: rotate(-90deg); }
.thinking-body {
  border-left: 2px solid var(--border);
  margin-left: 5px;
  padding-left: 14px;
  padding-top: 4px;
}
.thinking-block.collapsed .thinking-body { display: none; }

/* Reasoning text inside thinking block */
.reasoning {
  font-size: 12px; color: var(--text-secondary); font-style: italic;
  line-height: 1.55; margin-bottom: 8px;
}

/* Tool cards inside thinking block */
.tool-card {
  background: var(--tool-bg); border: 1px solid var(--border); border-radius: 8px;
  margin-bottom: 8px; overflow: hidden;
}
.tool-header {
  display: flex; align-items: center; gap: 7px; padding: 7px 10px;
  cursor: pointer; font-size: 12px; color: var(--text-secondary);
}
.tool-header .tool-name { font-weight: 500; color: var(--text); font-family: 'SF Mono', Monaco, Consolas, monospace; font-size: 12px; }
.tool-header .tool-toggle { margin-left: auto; font-size: 9px; transition: transform 0.15s; color: var(--text-muted); }
.tool-header.expanded .tool-toggle { transform: rotate(90deg); }
.tool-body { display: none; padding: 0 10px 8px; }
.tool-body.expanded { display: block; }
.tool-body pre {
  background: var(--bg-tertiary); padding: 8px; border-radius: 5px; font-size: 11px;
  overflow-x: auto; white-space: pre-wrap; color: var(--text-secondary);
  max-height: 180px; overflow-y: auto; font-family: 'SF Mono', Monaco, Consolas, monospace;
}
.tool-result-label { font-size: 11px; color: var(--text-muted); margin: 5px 0 3px; display: flex; align-items: center; gap: 6px; }
.exit-code { font-size: 10px; padding: 1px 5px; border-radius: 3px; font-weight: 500; }
.exit-code.ok { background: var(--success-bg); color: var(--success); }
.exit-code.fail { background: var(--error-bg); color: var(--error); }

/* File change cards inside thinking block */
.file-card {
  background: var(--tool-bg); border: 1px solid var(--border); border-radius: 8px;
  padding: 7px 10px; margin-bottom: 8px; font-size: 12px;
  display: flex; align-items: center; gap: 8px;
}
.file-path { font-family: 'SF Mono', Monaco, Consolas, monospace; color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.change-type { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 500; flex-shrink: 0; }
.change-type.add { background: var(--success-bg); color: var(--success); }
.change-type.edit, .change-type.update { background: var(--bg-tertiary); color: var(--text-secondary); }
.change-type.delete { background: var(--error-bg); color: var(--error); }

/* ---- Interactive cards (AskUserQuestion / ExitPlanMode passthrough) ---- */
.interactive-card {
  border: 1px solid var(--border-strong); border-radius: 10px;
  padding: 14px 16px; margin-bottom: 16px;
  background: var(--bg-secondary);
  animation: fadeIn 0.15s ease;
}
.interactive-tag {
  display: inline-block; font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.04em;
  color: var(--text-muted); background: var(--bg-tertiary);
  padding: 2px 8px; border-radius: 4px; margin-bottom: 8px;
}
.interactive-question {
  font-size: 14px; line-height: 1.5; color: var(--text);
  margin-bottom: 12px;
}
.interactive-options {
  display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px;
}
.interactive-option-btn {
  display: flex; flex-direction: column; gap: 2px;
  text-align: left; padding: 10px 14px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; cursor: pointer; font-family: inherit;
  transition: border-color 0.1s, background 0.1s;
}
.interactive-option-btn:hover:not(:disabled) {
  border-color: var(--border-strong); background: var(--bg-tertiary);
}
.interactive-option-btn:disabled { opacity: 0.5; cursor: default; }
.interactive-option-btn.selected {
  border-color: var(--accent); background: var(--accent-dim);
}
.option-label { font-size: 13px; font-weight: 500; color: var(--text); }
.option-desc { font-size: 11px; color: var(--text-secondary); }

.interactive-other {
  display: flex; gap: 6px; margin-top: 6px;
}
.interactive-other-input {
  flex: 1; padding: 8px 12px; font-size: 13px;
  border: 1px solid var(--border); border-radius: 8px;
  background: var(--bg); color: var(--text); outline: none;
  font-family: inherit;
}
.interactive-other-input:focus { border-color: var(--border-strong); }
.interactive-other-send {
  padding: 8px 14px; border: none; border-radius: 8px;
  background: var(--text); color: var(--bg); font-size: 13px;
  font-weight: 500; cursor: pointer; font-family: inherit;
  white-space: nowrap;
}
.interactive-other-send:disabled { opacity: 0.4; cursor: default; }

/* Question form layout */
.question-section { margin-bottom: 12px; }
.question-section:last-of-type { margin-bottom: 0; }
.question-card.submitted .interactive-option-btn:not(.selected) { opacity: 0.35; }
.question-submit-wrap {
  margin-top: 14px; display: flex; justify-content: flex-end;
}
.question-submit-btn {
  padding: 10px 28px; border: none; border-radius: 8px;
  background: var(--text); color: var(--bg); font-size: 14px;
  font-weight: 500; cursor: pointer; font-family: inherit;
  transition: opacity 0.1s;
}
.question-submit-btn:hover:not(:disabled) { opacity: 0.85; }
.question-submit-btn:disabled { opacity: 0.4; cursor: default; }

/* Plan approval */
.plan-body {
  max-height: 300px; overflow-y: auto;
  margin-bottom: 12px; font-size: 13px; line-height: 1.55;
  border: 1px solid var(--border); border-radius: 8px;
  padding: 12px 14px; background: var(--bg);
}
.plan-actions {
  display: flex; gap: 8px;
}
.plan-btn {
  flex: 1; padding: 10px 16px; border: none; border-radius: 8px;
  font-size: 13px; font-weight: 500; cursor: pointer;
  font-family: inherit; transition: opacity 0.1s;
}
.plan-btn:disabled { opacity: 0.4; cursor: default; }
.plan-btn.approve {
  background: var(--success); color: white;
}
.plan-btn.approve.selected { opacity: 1; }
.plan-btn.reject {
  background: var(--bg-tertiary); color: var(--text-secondary);
  border: 1px solid var(--border);
}
.plan-btn.reject.selected {
  background: var(--error-bg); color: var(--error); border-color: var(--error);
}

/* ---- Quick reply chips ---- */
.quick-replies {
  display: flex; gap: 6px; flex-wrap: wrap;
  max-width: var(--content-max); margin: 0 auto 8px;
  padding: 0 2px;
}
.qr-btn {
  padding: 5px 12px; border-radius: 16px;
  border: 1px solid var(--border-strong);
  background: var(--bg-secondary); color: var(--text-secondary);
  font-size: 13px; cursor: pointer; font-family: inherit;
  white-space: nowrap; transition: background 0.1s, color 0.1s;
}
.qr-btn:hover { background: var(--bg-tertiary); color: var(--text); }
.qr-btn:active { opacity: 0.75; }
.qr-btn .qr-del { display: none; margin-left: 4px; color: var(--text-muted); font-size: 11px; }
.quick-replies.editing .qr-btn .qr-del { display: inline; }
.quick-replies.editing .qr-btn:hover .qr-del { color: var(--error); }
.qr-add, .qr-edit-toggle {
  padding: 5px 10px; border-radius: 16px; border: 1px dashed var(--border-strong);
  background: transparent; color: var(--text-muted); font-size: 13px; cursor: pointer;
  font-family: inherit; white-space: nowrap; transition: color 0.1s;
}
.qr-add:hover, .qr-edit-toggle:hover { color: var(--text); }
.quick-replies.editing .qr-edit-toggle { border-style: solid; color: var(--text); background: var(--bg-tertiary); }

/* ---- Input area ---- */
.input-area {
  flex-shrink: 0;
  padding: 10px 16px;
  padding-bottom: calc(10px + var(--safe-bottom));
  background: var(--bg);
  border-top: 1px solid var(--border);
}
.input-wrapper {
  max-width: var(--content-max);
  margin: 0 auto;
  background: var(--bg);
  border: 1.5px solid var(--border-strong);
  border-radius: 14px;
  overflow: hidden;
  transition: border-color 0.15s;
}
.input-wrapper:focus-within { border-color: #aaa; }
.input-config-row {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 12px 6px;
  border-bottom: 1px solid var(--border);
}
.tool-select {
  padding: 3px 7px; background: transparent; border: 1px solid var(--border);
  border-radius: 5px; color: var(--text-secondary); font-size: 12px; outline: none;
  max-width: 130px; min-width: 0; flex-shrink: 1; cursor: pointer; font-family: inherit;
}
.tool-select option { background: var(--bg); color: var(--text); }
.tool-select:focus { border-color: var(--border-strong); }
.thinking-toggle {
  padding: 3px 9px; background: transparent; border: 1px solid var(--border);
  border-radius: 5px; color: var(--text-muted); font-size: 12px;
  cursor: pointer; white-space: nowrap; transition: all 0.15s; font-family: inherit;
}
.thinking-toggle:hover { border-color: var(--border-strong); color: var(--text-secondary); }
.thinking-toggle.active {
  background: var(--bg-tertiary); border-color: var(--border-strong); color: var(--text);
}
.input-config-row .img-btn {
  width: 26px; height: 26px; border-radius: 5px; border: 1px solid var(--border);
  background: transparent; color: var(--text-muted); font-size: 14px;
  cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.input-config-row .img-btn:active { background: var(--bg-tertiary); }
.input-config-row .img-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.input-row {
  display: flex; align-items: flex-end; gap: 8px;
  padding: 8px 10px 8px 14px;
}
.input-row textarea {
  flex: 1; padding: 3px 0; background: transparent; border: none;
  color: var(--text); font-size: 15px; resize: none;
  outline: none; line-height: 1.55;
  font-family: inherit;
  min-height: calc(1.55em * 3);
  max-height: calc(1.55em * 10);
  overflow-y: auto;
}
.input-row textarea::placeholder { color: var(--text-muted); }
.send-btn {
  width: 34px; height: 34px; border-radius: 50%; border: none;
  background: var(--text); color: var(--bg); font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: opacity 0.15s;
}
.send-btn:disabled { opacity: 0.25; cursor: not-allowed; }
.send-btn:active:not(:disabled) { opacity: 0.7; }
.cancel-btn {
  width: 34px; height: 34px; border-radius: 50%; border: none;
  background: var(--error); color: white; font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}

/* Image preview strip */
.img-preview-strip {
  display: none; gap: 8px; padding: 6px 14px; background: transparent;
  border-bottom: 1px solid var(--border); overflow-x: auto; flex-shrink: 0;
}
.img-preview-strip.has-images { display: flex; }
.img-preview-item {
  position: relative; width: 56px; height: 56px; border-radius: 7px;
  overflow: hidden; flex-shrink: 0; border: 1px solid var(--border);
}
.img-preview-item img { width: 100%; height: 100%; object-fit: cover; }
.img-preview-item .remove-img {
  position: absolute; top: 2px; right: 2px; width: 16px; height: 16px;
  border-radius: 50%; background: rgba(0,0,0,0.55); color: white; border: none;
  font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.file-preview-item {
  position: relative; height: 56px; border-radius: 7px; flex-shrink: 0;
  border: 1px solid var(--border); background: var(--bg-secondary);
  display: flex; align-items: center; padding: 6px 24px 6px 10px; max-width: 140px;
}
.file-preview-name {
  font-size: 11px; color: var(--text); overflow: hidden; text-overflow: ellipsis;
  white-space: nowrap; line-height: 1.3;
}
.file-preview-item .remove-img {
  position: absolute; top: 2px; right: 2px; width: 16px; height: 16px;
  border-radius: 50%; background: rgba(0,0,0,0.45); color: white; border: none;
  font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}

/* ---- Desktop (>= 768px) ---- */
@media (min-width: 768px) {
  .header-left #menuBtn { display: none; }

  .sidebar-overlay {
    display: block !important; position: static; background: none;
    width: var(--sidebar-width); flex-shrink: 0;
    border-right: 1px solid var(--border); z-index: auto;
    transition: width 0.2s ease;
  }
  .sidebar-overlay.collapsed { width: var(--sidebar-collapsed-width); }

  .sidebar {
    position: static; left: auto; width: 100%; height: 100%;
    border-right: none; z-index: auto; transition: none; padding-top: 0;
  }
  .sidebar-overlay.open .sidebar { left: auto; }
  .sidebar-header #closeSidebar { display: none; }
  .sidebar-collapse-btn { display: inline-flex; }

  .sidebar-overlay.collapsed .sidebar-header h2,
  .sidebar-overlay.collapsed .sidebar-list,
  .sidebar-overlay.collapsed .task-panel,
  .sidebar-overlay.collapsed .new-session-btn { display: none; }
  .sidebar-overlay.collapsed .sidebar-header {
    justify-content: center; padding: 12px 4px;
  }

  .messages { padding: 28px 32px; }
  .input-area { padding: 14px 32px; padding-bottom: calc(14px + var(--safe-bottom)); }
}

/* ---- Logo ---- */
.logo-main {
  color: var(--text-muted);
  margin-bottom: 16px;
  opacity: 0.6;
}

/* Floating status logo — bottom right */
.floating-logo {
  position: fixed;
  bottom: calc(16px + var(--safe-bottom));
  right: 16px;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  opacity: 0.35;
  transition: opacity 0.2s, color 0.3s;
  z-index: 50;
  pointer-events: none;
}
.floating-logo.active {
  color: var(--success);
  opacity: 0.85;
}
.floating-logo.active svg {
}
@keyframes logo-spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
.floating-logo-dot {
  position: absolute;
  bottom: 0;
  right: 0;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--text-muted);
  border: 2px solid var(--bg);
  transition: background 0.3s;
}
.floating-logo.active .floating-logo-dot {
  background: var(--success);
  animation: pulse 1.5s infinite;
}

/* ---- Task panel (sidebar tab) ---- */
.task-panel {
  display: none; flex-direction: column; gap: 6px;
  flex: 1; overflow-y: auto; padding: 8px;
}
.task-panel.visible { display: flex; }
.task-panel-header {
  display: flex; align-items: center; padding: 2px 4px 4px;
  user-select: none;
}
.task-panel-label {
  font-size: 10px; font-weight: 600; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.05em; flex: 1;
}
.task-panel-refresh {
  font-size: 12px; background: none; border: none; color: var(--text-muted);
  cursor: pointer; padding: 0 2px; font-family: inherit;
}
.task-panel-refresh:hover { color: var(--text); }
/* ---- Sidebar task cards (slim) ---- */
.task-item {
  border-radius: 8px; border: 1px solid var(--border);
  background: var(--bg-secondary); overflow: hidden; cursor: pointer;
}
.task-item:hover { background: var(--bg-tertiary); }
.task-item.active { border-color: var(--accent); background: var(--accent-dim); }
.task-item-header {
  display: flex; align-items: center; gap: 6px; padding: 8px 10px;
  font-size: 12px;
}
.task-item-name {
  font-weight: 600; color: var(--text); flex: 1;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.task-item-summary {
  font-size: 10px; color: var(--text-muted); padding: 0 10px 7px;
  font-family: 'SF Mono', Monaco, Consolas, monospace;
}
.task-item-toggle {
  position: relative; width: 28px; height: 16px; flex-shrink: 0; cursor: pointer;
}
.task-item-toggle input { display: none; }
.task-item-toggle .toggle-track {
  position: absolute; inset: 0; border-radius: 8px;
  background: var(--bg-tertiary); border: 1px solid var(--border);
  transition: background 0.15s, border-color 0.15s;
}
.task-item-toggle input:checked + .toggle-track {
  background: var(--success); border-color: var(--success);
}
.task-item-toggle .toggle-thumb {
  position: absolute; top: 2px; left: 2px; width: 12px; height: 12px;
  border-radius: 50%; background: #fff; transition: transform 0.15s;
  box-shadow: 0 1px 2px rgba(0,0,0,0.15);
}
.task-item-toggle input:checked ~ .toggle-thumb { transform: translateX(12px); }
.task-item.disabled { opacity: 0.55; }
.task-item.disabled .task-item-trigger { pointer-events: none; }
.task-item-trigger {
  padding: 2px 8px; font-size: 10px; border-radius: 5px; font-weight: 500;
  border: 1px solid var(--border); background: var(--bg); color: var(--text-secondary);
  cursor: pointer; font-family: inherit; flex-shrink: 0;
}
.task-item-trigger:hover:not(:disabled) { background: var(--bg-tertiary); color: var(--text); }
.task-item-trigger:disabled { opacity: 0.5; cursor: not-allowed; }

/* ---- Task detail (main content area) ---- */
.tdp-container {
  max-width: var(--content-max); width: 100%; margin: 0 auto;
  padding: 20px 16px; display: flex; flex-direction: column; gap: 20px;
}
.tdp-header {
  display: flex; align-items: center; gap: 10px;
  padding-bottom: 12px; border-bottom: 1px solid var(--border);
}
.tdp-title {
  font-size: 17px; font-weight: 600; flex: 1;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.tdp-status-badge {
  font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 500;
}
.tdp-status-badge.enabled { background: var(--success-bg); color: var(--success); }
.tdp-status-badge.disabled { background: var(--bg-tertiary); color: var(--text-muted); }
.tdp-body {
  display: flex; flex-direction: column; gap: 20px;
}
.tdp-section {
  display: flex; flex-direction: column; gap: 8px;
}
.tdp-section-title {
  font-size: 11px; font-weight: 600; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.04em;
}
.tdp-info-grid {
  display: grid; grid-template-columns: 100px 1fr; gap: 6px 14px;
  font-size: 13px; padding: 10px 14px; background: var(--bg-secondary);
  border-radius: 8px;
}
.tdp-info-label { color: var(--text-muted); font-weight: 500; }
.tdp-info-value { color: var(--text); }
.tdp-actions {
  display: flex; gap: 10px; align-items: center;
  padding: 12px 14px; background: var(--bg-secondary); border-radius: 8px;
}
.tdp-toggle {
  position: relative; width: 34px; height: 20px; flex-shrink: 0; cursor: pointer;
}
.tdp-toggle input { display: none; }
.tdp-toggle .toggle-track {
  position: absolute; inset: 0; border-radius: 10px;
  background: var(--bg-tertiary); border: 1px solid var(--border);
  transition: background 0.15s, border-color 0.15s;
}
.tdp-toggle input:checked + .toggle-track {
  background: var(--success); border-color: var(--success);
}
.tdp-toggle .toggle-thumb {
  position: absolute; top: 2px; left: 2px; width: 16px; height: 16px;
  border-radius: 50%; background: #fff; transition: transform 0.15s;
  box-shadow: 0 1px 2px rgba(0,0,0,0.15);
}
.tdp-toggle input:checked ~ .toggle-thumb { transform: translateX(14px); }
.tdp-toggle-label { font-size: 12px; color: var(--text-secondary); }
.tdp-run-btn {
  padding: 6px 16px; font-size: 12px; border-radius: 6px; font-weight: 500;
  border: 1px solid var(--border); background: var(--bg); color: var(--text-secondary);
  cursor: pointer; font-family: inherit; margin-left: auto;
}
.tdp-run-btn:hover:not(:disabled) { background: var(--bg-tertiary); color: var(--text); }
.tdp-run-btn:disabled { opacity: 0.5; cursor: not-allowed; }
/* Workflow detail */
.tdp-step {
  padding: 4px 0 2px; color: var(--text-secondary);
}
.tdp-step-header {
  font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 4px;
}
.tdp-task {
  padding: 4px 0 4px 12px; border-left: 2px solid var(--border);
  margin-left: 4px; margin-bottom: 6px;
}
.tdp-task-id {
  font-weight: 500; color: var(--text);
  font-family: 'SF Mono', Monaco, Consolas, monospace; font-size: 11px;
}
.tdp-task-meta {
  font-size: 10px; color: var(--text-muted); margin-top: 1px;
}
.tdp-task-prompt {
  font-family: 'SF Mono', Monaco, Consolas, monospace; font-size: 10px;
  color: var(--text-secondary); background: var(--bg-tertiary);
  padding: 6px 8px; border-radius: 4px; margin-top: 3px;
  white-space: pre-wrap; word-break: break-word; line-height: 1.4;
  max-height: 200px; overflow-y: auto;
}
/* Run history */
.tdp-run-entry {
  display: flex; align-items: center; gap: 8px; padding: 8px 10px;
  border-radius: 6px; font-size: 12px; cursor: pointer;
}
.tdp-run-entry:hover { background: var(--bg-tertiary); }
.tdp-run-id {
  font-family: 'SF Mono', Monaco, Consolas, monospace;
  color: var(--text-muted); flex-shrink: 0;
}
.tdp-run-status {
  font-size: 10px; padding: 1px 6px; border-radius: 4px; font-weight: 500; flex-shrink: 0;
}
.tdp-run-status.completed { background: var(--success-bg); color: var(--success); }
.tdp-run-status.failed { background: var(--error-bg); color: var(--error); }
.tdp-run-status.running { background: var(--bg-tertiary); color: var(--text-secondary); }
.tdp-run-status.unknown { background: var(--bg-tertiary); color: var(--text-muted); }
.tdp-run-time { font-size: 11px; color: var(--text-muted); flex: 1; }
.tdp-run-detail {
  display: none; padding: 6px 8px; gap: 4px; flex-direction: column;
  border-top: 1px solid var(--border); margin-top: 4px;
}
.tdp-run-detail.open { display: flex; }
.tdp-empty {
  font-size: 12px; color: var(--text-muted); padding: 8px 0;
}

/* ---- Workflow run detail (used by buildRunTasksHtml) ---- */
.workflow-task-row { border-radius: 6px; overflow: hidden; }
.workflow-task-header {
  display: flex; align-items: center; gap: 6px; padding: 5px 8px;
  background: var(--bg-tertiary); cursor: pointer;
  font-size: 11px; color: var(--text-secondary);
}
.workflow-task-header:hover { color: var(--text); }
.workflow-task-id {
  font-family: 'SF Mono', Monaco, Consolas, monospace; flex: 1;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.workflow-task-chevron { font-size: 9px; transition: transform 0.15s; color: var(--text-muted); flex-shrink: 0; }
.workflow-task-body {
  display: none; padding: 6px 8px; font-size: 11px; color: var(--text-secondary);
  font-family: 'SF Mono', Monaco, Consolas, monospace;
  white-space: pre-wrap; word-break: break-word; line-height: 1.5;
  max-height: 200px; overflow-y: auto;
  background: var(--bg); border-top: 1px solid var(--border);
}
.workflow-task-body.open { display: block; }
.workflow-empty {
  padding: 24px 16px; text-align: center; color: var(--text-muted);
  font-size: 12px; line-height: 1.6;
}
/* ---- Workflow main view (reserved) ---- */
.workflow-view {
  flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 12px;
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <button class="header-btn" id="menuBtn" title="Sessions">&#9776;</button>
    <h1 id="headerTitle">RemoteLab Chat</h1>
  </div>
  <div class="header-ctx" id="headerCtx">
    <div class="header-ctx-detail" id="headerCtxDetail"></div>
    <div class="header-ctx-bar-wrap">
      <div class="header-ctx-track">
        <div class="header-ctx-fill" id="headerCtxFill"></div>
      </div>
      <span class="header-ctx-pct" id="headerCtxPct"></span>
    </div>
    <button class="header-ctx-compress" id="headerCtxCompress">Compress</button>
    <button class="header-ctx-clear" id="headerCtxClear">Clear</button>
  </div>
  <div class="header-right">
    <button class="header-btn report-bell" id="reportBell" title="Reports">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span class="report-badge hidden" id="reportBadge">0</span>
    </button>
    <button class="header-btn" id="themeBtn" title="主题"></button>
    <div class="header-logo" id="headerLogo">
      <svg width="18" height="18" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <g stroke="currentColor" stroke-width="5.5" fill="none">
          <circle cx="50" cy="28" r="19"/>
          <circle cx="72" cy="50" r="19"/>
          <circle cx="50" cy="72" r="19"/>
          <circle cx="28" cy="50" r="19"/>
        </g>
        <circle cx="50" cy="50" r="4" fill="currentColor"/>
      </svg>
    </div>
    <span id="statusText">disconnected</span>
  </div>
</div>

<div class="app-container">
  <!-- Sidebar overlay -->
  <div class="sidebar-overlay" id="sidebarOverlay">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>RemoteLab</h2>
        <button class="sidebar-collapse-btn" id="collapseBtn" title="Collapse">&#9776;</button>
        <button class="header-btn" id="closeSidebar">&#x2715;</button>
      </div>
      <div class="sidebar-tabs">
        <button class="sidebar-tab active" id="tabSessions">Sessions</button>
        <button class="sidebar-tab" id="tabProgress">Progress</button>
        <button class="sidebar-tab" id="tabTasks">Tasks</button>
      </div>
      <div class="sidebar-list" id="sessionList"></div>
      <div class="progress-panel" id="progressPanel"></div>
      <div class="task-panel" id="taskPanel"></div>
      <button class="new-session-btn" id="newSessionBtn">+ New Session</button>
    </aside>
  </div>

  <!-- Chat area -->
  <main class="chat-area">
    <!-- Workflow detail view (replaces messages when a workflow is selected) -->
    <div id="workflowView" class="workflow-view" style="display:none"></div>

    <div class="messages" id="messages">
      <div class="messages-inner" id="messagesInner">
        <div class="empty-state" id="emptyState">
          <svg class="logo-main" width="80" height="80" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- 4 interlocking rings — network chain -->
            <g stroke="currentColor" stroke-width="4.5" fill="none">
              <circle cx="50" cy="28" r="19"/>
              <circle cx="72" cy="50" r="19"/>
              <circle cx="50" cy="72" r="19"/>
              <circle cx="28" cy="50" r="19"/>
            </g>
            <circle cx="50" cy="50" r="3.5" fill="currentColor"/>
          </svg>
          <h2>RemoteLab</h2>
          <p>Select or create a session from the sidebar, then start chatting with your AI coding tool.</p>
        </div>
      </div>
    </div>

    <!-- Input area -->
    <div class="input-area" id="inputArea">
      <div id="quickReplies" class="quick-replies" style="display:none"></div>
      <div class="input-wrapper">
        <!-- Image preview inside wrapper -->
        <div class="img-preview-strip" id="imgPreviewStrip"></div>
        <div class="input-config-row">
          <select class="tool-select" id="inlineToolSelect" disabled></select>
          <select class="tool-select" id="inlineModelSelect" disabled></select>
          <button class="thinking-toggle" id="thinkingToggle" disabled>Thinking</button>
          <button class="img-btn" id="imgBtn" disabled title="Attach image">&#128247;</button>
          <button class="img-btn" id="fileAttachBtn" disabled title="Attach file">&#128206;</button>
        </div>
        <div class="input-row">
          <input type="file" id="imgFileInput" accept="image/*" multiple hidden>
          <input type="file" id="fileAttachInput" multiple hidden>
          <textarea id="msgInput" placeholder="Message..." disabled></textarea>
          <button class="send-btn" id="sendBtn" disabled title="Send">&#9654;</button>
          <button class="cancel-btn" id="cancelBtn" title="Stop" style="display:none">&#9632;</button>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- New Session Modal -->
<div class="modal-overlay" id="newSessionModal">
  <div class="modal">
    <h3>New Session</h3>
    <label>Folder</label>
    <input type="text" id="folderInput" placeholder="/path/to/project" autocomplete="off">
    <div class="ac-suggestions" id="folderSuggestions"></div>
    <label>Tool</label>
    <select id="toolSelect"></select>
    <div class="modal-actions">
      <button class="btn-cancel" id="cancelModal">Cancel</button>
      <button class="btn-create" id="createSession">Create</button>
    </div>
  </div>
</div>

<!-- Report panel (slide-in from right) -->
<div class="report-panel hidden" id="reportPanel">
  <div class="report-panel-header">
    <h3>Reports</h3>
    <button class="header-btn" id="reportPanelClose">&times;</button>
  </div>
  <div class="report-list" id="reportList"></div>
</div>

<!-- Report detail overlay -->
<div class="report-detail hidden" id="reportDetail">
  <div class="report-detail-header">
    <button class="header-btn" id="reportBack">&larr;</button>
    <span class="report-detail-title" id="reportDetailTitle"></span>
    <button class="report-goto-btn" id="reportGotoSession">Go to Session</button>
    <button class="header-btn" id="reportDetailClose">&times;</button>
  </div>
  <iframe id="reportIframe" sandbox="allow-same-origin allow-popups allow-popups-to-escape-sandbox" class="report-iframe"></iframe>
</div>

<!-- Floating status logo -->
<div class="floating-logo" id="floatingLogo">
  <svg width="28" height="28" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <g stroke="currentColor" stroke-width="5.5" fill="none">
      <circle cx="50" cy="28" r="19"/>
      <circle cx="72" cy="50" r="19"/>
      <circle cx="50" cy="72" r="19"/>
      <circle cx="28" cy="50" r="19"/>
    </g>
    <circle cx="50" cy="50" r="4" fill="currentColor"/>
  </svg>
  <span class="floating-logo-dot" id="floatingLogoDot"></span>
</div>

<script src="/marked.min.js" nonce="{{NONCE}}"></script>
<script src="/chat.js" nonce="{{NONCE}}"></script>
</body>
</html>
